# Center-scan mapper - autonomous mapping WITHOUT wall-hugging.
# Drives to interior centers of open expanses, 360-scans, max 200 s.

map_frame: map
base_frame: base_footprint
scan_topic: /kobuki/laser/scan
cmd_vel_topic: ""

occupied_value: 65

# Center-scan — prefer deep interior (far from walls)
max_expanse_radius: 70
visited_center_radius: 1.0
goal_min_clearance: 0.35

# Faster 360 scans (still <= 1.0 rad/s for gmapping)
spin_speed: 1.0
spin_steps: 3
spin_pause: 0.15

# Corridor creep ONLY inside these map-frame boxes (kitchen entrance).
# Everywhere else: skip stuck goal, pick next expanse center — no wall-hug.
# Tune bounds in RViz if spawn shifts the map; click near the passage first.
corridor_zones:
  - name: kitchen_passage
    min_x: -6.5
    max_x: -2.0
    min_y: -1.0
    max_y: 4.0
    max_passage_width: 1.05

narrow_passage_width: 1.05
corridor_creep_range: 4.0
corridor_front_min: 0.22
creep_speed: 0.14
creep_duration: 5.0

# Fast skip on unreachable points — do not waste time on tiny pockets
per_goal_timeout: 9.0
min_travel: 0.08
max_consecutive_stuck: 10
blacklist_radius: 0.30
global_progress_timeout: 90.0
global_max_stuck: 50
max_blacklist_resets: 3

escape_clearance: 0.30
escape_back_speed: 0.14
escape_back_time: 1.2
creep_min_front: 0.22
rear_safe_clearance: 0.32

server_wait_timeout: 60.0

bootstrap_clearance: 0.35
bootstrap_forward_clearance: 0.85
bootstrap_forward_speed: 0.55

visit_waypoints: []
visit_timeout: 35.0

max_unknown_ratio: 0.10
max_runtime: 200.0
save_map_at_handoff: true
map_save_path: ""
min_frontier_cells: 4
distance_penalty: 4.0

explore_bounds_enabled: false
explore_min_x: -100.0
explore_max_x: 100.0
explore_min_y: -100.0
explore_max_y: 100.0
