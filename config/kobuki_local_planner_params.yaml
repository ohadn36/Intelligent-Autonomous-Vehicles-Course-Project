# DWA local planner — obstacle avoidance, replanning around walls, higher speed.
DWAPlannerROS:
  # Speed (Kobuki sim supports ~0.5-0.6 m/s)
  max_vel_x: 0.55
  min_vel_x: 0.0
  max_vel_theta: 1.8
  min_vel_theta: -1.8
  min_in_place_vel_theta: 0.4
  max_vel_trans: 0.55
  min_vel_trans: 0.0
  acc_lim_x: 2.5
  acc_lim_y: 0.0
  acc_lim_theta: 3.5

  # Goal tolerance
  xy_goal_tolerance: 0.15
  yaw_goal_tolerance: 0.15
  latch_xy_goal_tolerance: false

  # Look ahead — stop before hitting obstacles, pick detours
  sim_time: 2.5
  sim_granularity: 0.025
  angular_sim_granularity: 0.05
  vx_samples: 18
  vy_samples: 1
  vtheta_samples: 36

  # Cost weights — high occdist_scale = strong obstacle avoidance
  path_distance_bias: 32.0
  goal_distance_bias: 20.0
  occdist_scale: 3.0

  forward_point_distance: 0.35
  stop_time_buffer: 0.3
  scaling_speed: 0.25
  max_scaling_factor: 0.2

  holonomic_robot: false
  escape_vel: -0.1
