# Costmap parameters for Kobuki (course simulation robot)
# Tuned for real-time LiDAR obstacle detection and safe clearance around walls.

obstacle_range: 5.0
raytrace_range: 6.0
footprint: [[0.18, -0.14], [0.18, 0.14], [-0.18, 0.14], [-0.18, -0.14]]
footprint_padding: 0.05
inflation_radius: 0.45
cost_scaling_factor: 4.0

observation_sources: laser_scan_sensor

laser_scan_sensor:
  # No sensor_frame: let costmap_2d read the frame from the LaserScan header.
  # Hardcoding the wrong frame makes costmap drop every scan (blind obstacle
  # layer -> robot drives through walls). The topic is the single source of
  # truth and is overridden from the launch `scan_topic` arg.
  data_type: LaserScan
  topic: /kobuki/laser/scan
  marking: true
  clearing: true
  inf_is_valid: false
  min_obstacle_height: 0.0
  max_obstacle_height: 2.0
  obstacle_range: 5.0
  raytrace_range: 6.0
  expected_update_rate: 0.0
