# DWA during exploration — brisk forward travel, but rotation is CAPPED so
# gmapping can match scans while turning (fast spins caused scan-match failures
# and map drift). Trajectory sample count is cut ~4x to keep the control loop
# real-time on the shared CPU.
DWAPlannerROS:
  # Fast forward travel during mapping...
  max_vel_x: 0.65
  min_vel_x: 0.0
  # ...but rotation stays capped (<= ~0.9 rad/s): faster in-place turns out-run
  # gmapping's scan matcher on the shared CPU -> "Scan Matching Failed, using
  # odometry" -> the map drifts and walls smear (looks like driving through
  # walls). Linear speed is safe to raise; rotation is the dangerous knob.
  max_vel_theta: 0.9
  min_vel_theta: -0.9
  min_in_place_vel_theta: 0.3
  max_vel_trans: 0.65
  min_vel_trans: 0.0
  acc_lim_x: 2.8
  acc_lim_y: 0.0
  acc_lim_theta: 2.0

  xy_goal_tolerance: 0.18
  yaw_goal_tolerance: 0.35
  latch_xy_goal_tolerance: false

  sim_time: 2.0
  sim_granularity: 0.05
  angular_sim_granularity: 0.10
  vx_samples: 10
  vy_samples: 1
  vtheta_samples: 20

  path_distance_bias: 24.0
  goal_distance_bias: 28.0
  occdist_scale: 1.4

  forward_point_distance: 0.12
  stop_time_buffer: 0.20
  scaling_speed: 0.35
  max_scaling_factor: 0.30
  prune_plan: true

  holonomic_robot: false
  escape_vel: -0.10
