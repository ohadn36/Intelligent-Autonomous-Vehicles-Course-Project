# DWA local planner — obstacle avoidance, replanning around walls.
# Navigation runs on the saved static map (no SLAM), so speed can be high:
# there is no scan-matcher to out-run here.
DWAPlannerROS:
  max_vel_x: 0.85
  min_vel_x: 0.0
  max_vel_theta: 2.2
  min_vel_theta: -2.2
  min_in_place_vel_theta: 0.5
  max_vel_trans: 0.85
  min_vel_trans: 0.0
  acc_lim_x: 3.0
  acc_lim_y: 0.0
  acc_lim_theta: 4.0

  # Goal tolerance
  xy_goal_tolerance: 0.15
  yaw_goal_tolerance: 0.15
  latch_xy_goal_tolerance: false

  # Look ahead — stop before hitting obstacles, pick detours
  sim_time: 2.5
  sim_granularity: 0.025
  angular_sim_granularity: 0.05
  vx_samples: 18
  vy_samples: 1
  vtheta_samples: 36

  # Cost weights — high occdist_scale = strong obstacle avoidance
  path_distance_bias: 32.0
  goal_distance_bias: 20.0
  occdist_scale: 3.0

  forward_point_distance: 0.35
  stop_time_buffer: 0.3
  scaling_speed: 0.25
  max_scaling_factor: 0.2

  holonomic_robot: false
  escape_vel: -0.1
