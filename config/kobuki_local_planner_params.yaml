# DWA local planner — tuned for narrow corridors on the saved static map.
# Global navfn may plan through ~0.85 m doorways; DWA must be able to EXECUTE
# those plans (lower peak speed, stronger near-obstacle scaling, shorter horizon).
DWAPlannerROS:
  max_vel_x: 0.55
  min_vel_x: 0.04
  max_vel_theta: 1.4
  min_vel_theta: -1.4
  min_in_place_vel_theta: 0.35
  max_vel_trans: 0.55
  min_vel_trans: 0.04
  acc_lim_x: 2.0
  acc_lim_y: 0.0
  acc_lim_theta: 2.5

  xy_goal_tolerance: 0.15
  yaw_goal_tolerance: 0.20
  latch_xy_goal_tolerance: false

  # Shorter horizon + closer look-ahead -> fits tight corners
  sim_time: 1.6
  sim_granularity: 0.025
  angular_sim_granularity: 0.05
  vx_samples: 20
  vy_samples: 1
  vtheta_samples: 40

  path_distance_bias: 24.0
  goal_distance_bias: 24.0
  occdist_scale: 2.0

  forward_point_distance: 0.20
  stop_time_buffer: 0.25
  scaling_speed: 0.18
  max_scaling_factor: 0.55

  holonomic_robot: false
  escape_vel: -0.08
