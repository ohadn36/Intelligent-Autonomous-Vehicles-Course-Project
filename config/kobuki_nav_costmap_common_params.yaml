# Navigation-phase costmap (static map + live laser).
# Lower inflation than mapping/explore so DWA can execute global plans through
# ~0.85 m doorways. The live obstacle layer still prevents wall collisions.

obstacle_range: 5.0
raytrace_range: 6.0
footprint: [[0.18, -0.14], [0.18, 0.14], [-0.18, 0.14], [-0.18, -0.14]]
footprint_padding: 0.02
inflation_radius: 0.30
cost_scaling_factor: 5.0

observation_sources: laser_scan_sensor

laser_scan_sensor:
  data_type: LaserScan
  topic: /kobuki/laser/scan
  marking: true
  clearing: true
  inf_is_valid: false
  min_obstacle_height: 0.0
  max_obstacle_height: 2.0
  obstacle_range: 5.0
  raytrace_range: 6.0
  expected_update_rate: 0.0
